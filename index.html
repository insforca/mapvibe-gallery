<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MapVibe — Virtual Room Walkthrough</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; overflow: hidden; font-family: 'Georgia', serif; }
    
    #canvas-container { position: fixed; inset: 0; }

    /* HUD */
    #hud { 
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      display: flex; flex-direction: column; 
    }
    
    /* Logo */
    #logo {
      position: fixed; top: 28px; left: 36px;
      font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
      font-size: 18px; letter-spacing: 0.22em; text-transform: uppercase;
      color: #C9A96E; opacity: 0.9; pointer-events: none;
    }
    #logo span { color: rgba(201,169,110,0.5); font-size: 10px; display: block; letter-spacing: 0.35em; margin-top: 3px; }

    /* Room counter */
    #room-counter {
      position: fixed; top: 28px; right: 36px;
      color: rgba(201,169,110,0.6); font-size: 12px;
      letter-spacing: 0.2em; pointer-events: none;
    }

    /* Room title */
    #room-title {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      text-align: center; pointer-events: none;
    }
    #room-title h2 {
      color: #C9A96E; font-size: 28px; font-weight: 400;
      letter-spacing: 0.15em; text-transform: uppercase;
      font-family: 'Palatino Linotype', serif;
      text-shadow: 0 2px 20px rgba(0,0,0,0.8);
    }
    #room-title p {
      color: rgba(245,237,228,0.6); font-size: 12px;
      letter-spacing: 0.3em; text-transform: uppercase;
      margin-top: 8px;
    }

    /* Annotation pill */
    #annotation {
      position: fixed; top: 50%; right: 48px; transform: translateY(-50%);
      max-width: 220px; pointer-events: none;
      opacity: 0; transition: opacity 0.5s;
    }
    #annotation.visible { opacity: 1; }
    #annotation-inner {
      background: rgba(27,42,74,0.85);
      border: 1px solid rgba(201,169,110,0.3);
      border-radius: 12px;
      padding: 20px 22px;
      backdrop-filter: blur(12px);
    }
    #annotation-inner h4 {
      color: #C9A96E; font-size: 11px; letter-spacing: 0.25em;
      text-transform: uppercase; margin-bottom: 10px;
    }
    #annotation-inner p {
      color: rgba(245,237,228,0.85); font-size: 12.5px; line-height: 1.65;
    }

    /* Navigation */
    #nav {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 24px;
      pointer-events: all;
    }
    .nav-btn {
      width: 50px; height: 50px; border-radius: 50%;
      background: rgba(27,42,74,0.7); border: 1px solid rgba(201,169,110,0.4);
      color: #C9A96E; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; backdrop-filter: blur(8px);
    }
    .nav-btn:hover { background: rgba(201,169,110,0.2); border-color: #C9A96E; transform: scale(1.05); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

    /* Dot indicators */
    #dots {
      display: flex; gap: 10px; align-items: center;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(201,169,110,0.3); cursor: pointer;
      transition: all 0.3s; pointer-events: all;
    }
    .dot.active { background: #C9A96E; transform: scale(1.3); }

    /* Transition overlay */
    #overlay {
      position: fixed; inset: 0; background: #0a0a0a;
      opacity: 0; pointer-events: none; z-index: 50;
      transition: opacity 0.45s ease;
    }
    #overlay.fade-out { opacity: 0; }
    #overlay.fade-in { opacity: 1; }

    /* Loading */
    #loading {
      position: fixed; inset: 0; background: #0a0a0a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100;
    }
    #loading h1 {
      color: #C9A96E; font-family: 'Palatino Linotype', serif;
      font-size: 22px; letter-spacing: 0.3em; text-transform: uppercase;
      font-weight: 400; margin-bottom: 16px;
    }
    #progress-bar {
      width: 180px; height: 1px; background: rgba(201,169,110,0.2); margin-top: 8px;
    }
    #progress-fill {
      height: 1px; background: #C9A96E; width: 0%;
      transition: width 0.3s;
    }
    #loading p { color: rgba(245,237,228,0.4); font-size: 11px; letter-spacing: 0.2em; margin-top: 12px; }

    /* Drag hint */
    #drag-hint {
      position: fixed; bottom: 95px; left: 50%; transform: translateX(-50%);
      color: rgba(245,237,228,0.3); font-size: 11px; letter-spacing: 0.2em;
      pointer-events: none; text-align: center;
    }
  </style>
</head>
<body>

<div id="loading">
  <h1>MapVibe</h1>
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <p>Loading rooms...</p>
</div>

<div id="canvas-container"></div>

<div id="overlay"></div>

<div id="logo">
  MapVibe
  <span>City Map Prints</span>
</div>

<div id="room-counter"></div>

<div id="room-title">
  <h2 id="title-text"></h2>
  <p id="subtitle-text"></p>
</div>

<div id="annotation">
  <div id="annotation-inner">
    <h4 id="ann-title">Custom Map</h4>
    <p id="ann-body"></p>
  </div>
</div>

<div id="drag-hint">DRAG TO EXPLORE · SCROLL TO ZOOM</div>

<div id="nav">
  <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">&#8592;</button>
  <div id="dots"></div>
  <button class="nav-btn" id="btn-next" onclick="navigate(1)">&#8594;</button>
</div>

<script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Room Data ─────────────────────────────────────────────────────────────────
const ROOMS = [
  {
    id: 'buenos-aires',
    title: 'Dining Room',
    subtitle: 'Buenos Aires — Vintage Noir',
    color: 0x1B2A4A,
    image: 'img/buenos_aires.jpg',
    depth: 'img/depth_buenos_aires.png',
    annotation: {
      title: 'Custom City Map',
      body: 'Each print is hand-crafted from precise OpenStreetMap data. Your city, your streets, your story — printed on archival matte paper.',
    }
  },
  {
    id: 'barcelona-kitchen',
    title: 'Kitchen',
    subtitle: 'Barcelona — Med Vibes',
    color: 0x2A1B0A,
    image: 'img/barcelona_kitchen.jpg',
    depth: 'img/depth_barcelona_kitchen.png',
    annotation: {
      title: 'Print Themes',
      body: 'Choose from Med Vibes (warm cream & gold tones) or Vintage Noir (dramatic black & ivory). Every home has a map that fits.',
    }
  },
  {
    id: 'barcelona-living',
    title: 'Living Room',
    subtitle: 'Barcelona — Editorial',
    color: 0x1A2810,
    image: 'img/barcelona_living.jpg',
    depth: 'img/depth_barcelona_living.png',
    annotation: {
      title: 'Frame Styles',
      body: 'Slim black aluminium or warm oak wood frames, available in A2, A1, and 50×70 cm. Ships worldwide with tracked delivery.',
    }
  },
  {
    id: 'caracas-study',
    title: 'Study',
    subtitle: 'Caracas — Vintage Noir',
    color: 0x1B0A0A,
    image: 'img/caracas_study.jpg',
    depth: 'img/depth_caracas_study.png',
    annotation: {
      title: 'The Perfect Gift',
      body: 'Personalised with the exact streets that matter to you — a childhood home, where you met, where it all started.',
    }
  }
];

// ── Scene Setup ───────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 0, 4.5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.rotateSpeed = 0.4;
controls.enableZoom = true;
controls.minDistance = 2.5;
controls.maxDistance = 7;
controls.enablePan = false;
// Limit orbit to a cone — don't let camera go behind the plane
controls.maxPolarAngle = Math.PI * 0.7;
controls.minPolarAngle = Math.PI * 0.3;
controls.maxAzimuthAngle = Math.PI * 0.25;
controls.minAzimuthAngle = -Math.PI * 0.25;

const scene = new THREE.Scene();

// ── Lights ────────────────────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const spotLight = new THREE.SpotLight(0xffd4a0, 2.5, 20, Math.PI * 0.2, 0.4, 1);
spotLight.position.set(0, 3, 5);
scene.add(spotLight);

const fillLight = new THREE.PointLight(0xC9A96E, 0.5, 15);
fillLight.position.set(-3, -1, 3);
scene.add(fillLight);

// ── Texture Loader ────────────────────────────────────────────────────────────
const loader = new THREE.TextureLoader();
loader.crossOrigin = 'anonymous';

let meshes = [];
let currentIndex = 0;
let isTransitioning = false;

// Preload all textures
let loadedCount = 0;
const totalTextures = ROOMS.length * 2;
const progressFill = document.getElementById('progress-fill');

function onTextureLoaded() {
  loadedCount++;
  const pct = Math.round((loadedCount / totalTextures) * 100);
  progressFill.style.width = pct + '%';
  if (loadedCount >= totalTextures) {
    buildAllMeshes();
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      showRoom(0, true);
    }, 300);
  }
}

// Preload
const texturePairs = ROOMS.map(room => {
  const imgTex = loader.load(room.image, onTextureLoaded);
  imgTex.colorSpace = THREE.SRGBColorSpace;
  const depthTex = loader.load(room.depth, onTextureLoaded);
  return { imgTex, depthTex };
});

// ── Build Meshes ──────────────────────────────────────────────────────────────
function buildAllMeshes() {
  ROOMS.forEach((room, i) => {
    const { imgTex, depthTex } = texturePairs[i];

    // High-res grid plane for displacement
    const geo = new THREE.PlaneGeometry(8, 5.5, 240, 160);

    const mat = new THREE.MeshStandardMaterial({
      map: imgTex,
      displacementMap: depthTex,
      displacementScale: 0.9,
      displacementBias: -0.45,
      roughness: 0.9,
      metalness: 0.0,
    });

    const mesh = new THREE.Mesh(geo, mat);
    mesh.visible = false;
    scene.add(mesh);
    meshes.push(mesh);

    // A subtle background plane behind (fills scene)
    const bgGeo = new THREE.PlaneGeometry(16, 11);
    const bgMat = new THREE.MeshBasicMaterial({
      map: imgTex,
      opacity: 0.12,
      transparent: true,
    });
    const bg = new THREE.Mesh(bgGeo, bgMat);
    bg.position.z = -2;
    bg.visible = false;
    scene.add(bg);
    meshes[i]._bg = bg;
  });

  buildDots();
}

// ── Navigation ────────────────────────────────────────────────────────────────
function buildDots() {
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  ROOMS.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => { if (!isTransitioning) goToRoom(i); };
    dotsEl.appendChild(dot);
  });
}

function updateDots(index) {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === index);
  });
  document.getElementById('btn-prev').disabled = index === 0;
  document.getElementById('btn-next').disabled = index === ROOMS.length - 1;
  document.getElementById('room-counter').textContent =
    String(index + 1).padStart(2, '0') + ' / ' + String(ROOMS.length).padStart(2, '0');
}

function showRoom(index, instant) {
  // Hide all
  meshes.forEach((m, i) => {
    m.visible = false;
    if (m._bg) m._bg.visible = false;
  });

  const room = ROOMS[index];
  meshes[index].visible = true;
  if (meshes[index]._bg) meshes[index]._bg.visible = true;

  scene.background = new THREE.Color(room.color);
  scene.fog = new THREE.FogExp2(room.color, 0.04);

  spotLight.position.set(0, 3, 5);
  fillLight.color.set(room.color);
  camera.position.set(0, 0, 4.5);
  controls.target.set(0, 0, 0);
  controls.update();

  updateDots(index);

  // Update HUD
  document.getElementById('title-text').textContent = room.title;
  document.getElementById('subtitle-text').textContent = room.subtitle;
  document.getElementById('ann-title').textContent = room.annotation.title;
  document.getElementById('ann-body').textContent = room.annotation.body;

  if (!instant) {
    setTimeout(() => {
      document.getElementById('annotation').classList.add('visible');
    }, 800);
  } else {
    setTimeout(() => {
      document.getElementById('annotation').classList.add('visible');
    }, 600);
  }
}

function goToRoom(index) {
  if (isTransitioning || index === currentIndex) return;
  isTransitioning = true;
  document.getElementById('annotation').classList.remove('visible');

  const overlay = document.getElementById('overlay');
  overlay.classList.add('fade-in');

  setTimeout(() => {
    currentIndex = index;
    showRoom(currentIndex, false);
    overlay.classList.remove('fade-in');
    overlay.classList.add('fade-out');
    setTimeout(() => {
      isTransitioning = false;
    }, 500);
  }, 450);
}

window.navigate = function(dir) {
  const target = currentIndex + dir;
  if (target >= 0 && target < ROOMS.length) goToRoom(target);
};

// ── Keyboard ──────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'd') navigate(1);
  if (e.key === 'ArrowLeft' || e.key === 'a') navigate(-1);
});

// ── Animation Loop ────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let autoRotateTimer = 0;

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  controls.update();

  // Gentle ambient mesh breathing
  if (meshes[currentIndex]) {
    const t = clock.getElapsedTime();
    meshes[currentIndex].material.displacementScale = 0.9 + Math.sin(t * 0.4) * 0.05;
  }

  renderer.render(scene, camera);
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>

</body>
</html>
